<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mes avis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <script src="{{ url_for('static', filename='js/scriptAccueil.js') }}" defer></script>
</head>
<body>
<header>
    <div class="nav-container">

        <div class="logo-section">
            <h1>Disney -</h1>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" type="button" id="series-btn">Mes Séries</button>
            <button class="nav-btn" type="button" id="categories-btn">Catégories</button>
            <button class="nav-btn btn-special" type="button" id="recommandations-btn">IA Recommandations</button>
        </div>

        <div class="profile-dropdown">
            <img src="{{ url_for('static', filename='images/Avatar1.jpg') }}" 
            class="user-avatar" alt="Profil">

            <div class="dropdown-content">
                <p class="user-name">Bonjour {{ user.username }} !</p>
                <hr>
                <button class="btn-logout" type="button" id="logout-btn">
                    Se déconnecter
                </button>
            </div>
        </div>

    </div>
</header>

    <main>
        <article>
            <div class="card">
                <h2>Rechercher une série</h2>
                <form id="formRecherche">
                    <label for="searchInput">Nom de la série</label>
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="Ex: Breaking Bad"
                    >
                    <button type="submit">Rechercher</button>
                </form>
            </div>
            <div class="card">
                <h2>Résultats</h2>
                <div id="resultats"></div>
            </div>
        </article>
    </main>

    <footer>
        <p>Disney -</p>
    </footer>
</body>
</html>
