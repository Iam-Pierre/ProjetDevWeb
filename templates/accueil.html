<!DOCTYPE>
<html>

<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styleAccueil.css') }}">
    <script src="{{ url_for('static', filename='js/scriptTvMaze.js')}}" defer></script>
    <title>GenAI</title>

</head>

<body>
    <header>
        <h3>GenAI</h3>
        <nav>
            <a href="./exercice1.html">Recommendation</a>
            <a href="./exercice2.html">Avis</a>
            <a href="./exercice3.html">Deconnecter</a>
        </nav>
    </header>
    <main>
        <article>
            <form>
                <div class="form-row">
                    <div class="input-group">
                        <label for="serie">Nom de serie :</label>
                        <input type="text" id="serie" name="serie" />
                    </div>

                    <div class="input-group">
                        <label for="category">Categorie :</label>
                        <select id="category" name="category">
                            {%for categorie in categories%}
                            <option>{{categorie}}</option>
                            {%endfor%}
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="tri">Trier par :</label>
                        <div class="range-group" id="tri" name="tri">

                            Note<label><input type="range" name="note" value="5" min="1" max="9" step="0.1"
                                    oninput="document.getElementById('output').innerHTML = this.value" />

                                <div id="output" style="display: inline-block;"> 5</div>

                            </label>
                        </div>
                    </div>

                     

                </div>
                    <div id ="bouton">
                    <button id="categoryBtn">Parcourir par catégorie</button>
                    <button>Afficher</button>
                      <button id="top10">Top 10</button>
                    </div>
            </form>
            <br>
            <div id="tvmaze">
            </div>
        </article>
        <aside id='info'>information complémentaire
        </aside>
    </main>
    <footer>
        <p>Copyright &#169; 2023</p>
    </footer>
</body>

</html>
