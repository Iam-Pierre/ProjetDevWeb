<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mes avis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <script src="{{ url_for('static', filename='js/categoriesSeries.js') }}" defer></script>
</head>
<body>
    <header>
        <h1>Disney -</h1>
        <p>Explorer par catégorie</p>
    </header>

        <main>
        <article>
            
            <div class="card">
                <h2>Découvrir</h2>

                <div class="card-actions">
                    <button type="button" id="top10">Voir le top 10</button>
                </div>

                <div style="margin-top: 1rem;">
                    <label for="category">Parcourir par catégorie</label>
                    <select id="category">
                        <option value="">-- Choisir une catégorie --</option>
                        {% for category in categories %}
                            <option value="{{ category }}">{{ category }}</option>
                        {% endfor %}
                    </select>
                    <button type="button" id="categoryBtn">Parcourir</button>
                </div>
            </div> 

            <!-- Résultats -->
            <div class="card">
                <h2>Résultats</h2>
                <div id="resultats"></div>
            </div>
